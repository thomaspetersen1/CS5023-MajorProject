services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Set this to the robot's IP address so the browser can reach rosbridge.
        # Example: NEXT_PUBLIC_ROSBRIDGE_URL=ws://192.168.1.50:9090
        NEXT_PUBLIC_ROSBRIDGE_URL: ${NEXT_PUBLIC_ROSBRIDGE_URL:-ws://localhost:9090}
    ports:
      - "3000:3000"
    restart: unless-stopped
